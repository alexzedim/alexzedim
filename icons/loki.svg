<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <title>Loki</title>
  <defs>
    <linearGradient id="verticalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F46800"/>
      <stop offset="100%" style="stop-color:#FFCC00"/>
    </linearGradient>
    <linearGradient id="horizontalGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFCC00"/>
      <stop offset="100%" style="stop-color:#FFE082"/>
    </linearGradient>
  </defs>
  <!-- Vertical bars -->
  <rect x="2" y="2" width="2" height="12" rx="0.3" fill="url(#verticalGradient)"/>
  <rect x="5" y="4" width="2" height="10" rx="0.3" fill="url(#verticalGradient)"/>
  <rect x="8" y="3" width="2" height="11" rx="0.3" fill="url(#verticalGradient)"/>
  <rect x="11" y="5" width="2" height="9" rx="0.3" fill="url(#verticalGradient)"/>
  <rect x="14" y="4" width="2" height="10" rx="0.3" fill="url(#verticalGradient)"/>
  <rect x="17" y="6" width="2" height="8" rx="0.3" fill="url(#verticalGradient)"/>
  <!-- Connector squares -->
  <rect x="2" y="15" width="2" height="2" rx="0.2" fill="url(#horizontalGradient)"/>
  <rect x="5" y="15" width="2" height="2" rx="0.2" fill="url(#horizontalGradient)"/>
  <rect x="8" y="15" width="2" height="2" rx="0.2" fill="url(#horizontalGradient)"/>
  <rect x="11" y="15" width="2" height="2" rx="0.2" fill="url(#horizontalGradient)"/>
  <rect x="14" y="15" width="2" height="2" rx="0.2" fill="url(#horizontalGradient)"/>
  <rect x="17" y="15" width="2" height="2" rx="0.2" fill="url(#horizontalGradient)"/>
  <!-- Horizontal bars -->
  <rect x="5" y="18" width="17" height="2" rx="0.3" fill="url(#horizontalGradient)"/>
  <rect x="8" y="21" width="14" height="2" rx="0.3" fill="url(#horizontalGradient)"/>
</svg>